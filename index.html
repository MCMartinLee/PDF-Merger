<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Merger</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-labelledby="app-title">
        <div class="header">
          <p class="eyebrow">Private browser-side tool</p>
          <h1 id="app-title">PDF Editor</h1>
          <p class="intro">
            Select or drop PDFs, add them to the editor, then modify pages and export one final file.
          </p>
        </div>

        <label class="drop-zone" id="dropZone" for="fileInput">
          <input
            id="fileInput"
            type="file"
            accept=".pdf,application/pdf"
            multiple
          />
          <span class="drop-icon" aria-hidden="true">+</span>
          <span class="drop-title">Drop PDFs here or click to choose</span>
          <span class="drop-note">Only .pdf files are accepted. Files stay in your browser.</span>
        </label>

        <div class="toolbar">
          <p id="statusMessage" class="status" role="status" aria-live="polite">
            No files selected.
          </p>
        </div>

        <ul id="fileList" class="file-list" aria-label="Selected PDF files"></ul>

        <section class="preview-panel" aria-labelledby="preview-title">
          <div class="preview-header">
            <div>
              <p class="eyebrow">Visual editor</p>
              <h2 id="preview-title">PDF Pages</h2>
              <p id="previewMeta" class="preview-meta">Select a PDF to preview it.</p>
            </div>
          </div>

          <div class="edit-toolbar" aria-label="Basic PDF modifications">
            <button id="rotatePageButton" class="secondary-button" type="button" disabled>
              Rotate selected
            </button>
            <button id="excludePageButton" class="secondary-button danger" type="button" disabled>
              Delete selected
            </button>
            <button id="exportButton" class="secondary-button" type="button" disabled>
              Export final PDF
            </button>
          </div>

          <div class="editor-shell">
            <aside class="thumbnail-pane" aria-label="Page thumbnails">
              <div id="thumbnailList" class="thumbnail-list"></div>
            </aside>
            <div class="document-pane" aria-label="PDF document preview">
              <div id="documentPages" class="document-pages"></div>
              <p id="emptyPreview" class="empty-preview">Your selected PDF will appear here.</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
